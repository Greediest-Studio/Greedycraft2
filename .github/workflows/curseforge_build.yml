name: build (Curseforge)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "minecraft/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    defaults:
      run:
        working-directory: ./minecraft

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. 设置 Go 语言环境
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.3"
          cache: false

      - name: 3. 安装 packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: 4. 打包前合并 submods
        run: |
          if [ -d mods/submods ]; then
            find mods/submods -mindepth 1 -maxdepth 1 -type f -print0 | while IFS= read -r -d '' file; do
              mv -- "$file" mods/
            done
            rmdir mods/submods || true
          fi

      - name: 5. 导出 Curseforge 整合包
        id: export
        run: |
          packwiz curseforge export

      - name: 6. 重命名整合包文件
        run: |
          original_name=$(ls *.zip | head -n 1 | sed 's/.zip$//')
          branch_name="${GITHUB_REF_NAME}"
          short_sha=$(git log -1 --format="%h" -- .)
          new_name="${original_name}-build(${branch_name})-${short_sha}"
          mv "${original_name}.zip" "${new_name}.zip"
          echo "FILE_PATH=${new_name}.zip" >> $GITHUB_ENV
          echo "FILE_NAME=${new_name}" >> $GITHUB_ENV

      - name: 7. 创建空目录并解压
        run: |
          mkdir -p unzipped
          unzip -O UTF-8 "$FILE_PATH" -d unzipped/

      - name: 8. 上传至 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.FILE_NAME }}
          path: minecraft/unzipped/
          retention-days: 4
