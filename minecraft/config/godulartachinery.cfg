# Configuration file

maintenance {
    S:baseDamagePerRecipe=1.0E-5
    S:maintenanceItems <
        tconstruct:pickaxe@0:1
        tconstruct:shovel@0:1
        tconstruct:hatchet@0:1
        tcomplement:chisel@0:1
     >
}


muffler {
    # If true, the machine stops when the muffler byproduct buffer is full.
    # If false (default), the machine continues running and excess byproduct is discarded. [default: false]
    B:blockWhenFull=true

    # Registry name of the byproduct item (e.g. minecraft:coal). [default: minecraft:coal]
    S:byproductItem=jaopca:dust.carbon

    # Metadata / damage value of the byproduct item. Default 0. [range: 0 ~ 32767, default: 0]
    I:byproductMeta=0

    # Probability [0, 1] that one byproduct item is generated each time a recipe completes in Huge Muffler Hatch (16 slots). Default 0.45 = 45%. [range: 0.0 ~ 1.0, default: 0.45]
    S:hugeByproductChance=0.45

    # Probability [0, 1] that one byproduct item is generated each time a recipe completes in Large Muffler Hatch (12 slots). Default 0.35 = 35%. [range: 0.0 ~ 1.0, default: 0.35]
    S:largeByproductChance=0.35

    # Probability [0, 1] that one byproduct item is generated each time a recipe completes in ME Muffler Hatch. Default 0.50 = 50%. [range: 0.0 ~ 1.0, default: 0.5]
    S:meByproductChance=0.5

    # Probability [0, 1] that one byproduct item is generated each time a recipe completes in Medium Muffler Hatch (8 slots). Default 0.25 = 25%. [range: 0.0 ~ 1.0, default: 0.25]
    S:mediumByproductChance=0.25

    # Block registry names that do NOT count as obstructions for the Muffler Hatch exhaust.
    # Air and replaceable materials are always treated as passable regardless of this list.
    # Example entry: minecraft:glass_pane [default: ]
    S:passableBlocks <
     >

    # Probability [0, 1] that one byproduct item is generated each time a recipe completes in Small Muffler Hatch (4 slots). Default 0.15 = 15%. [range: 0.0 ~ 1.0, default: 0.15]
    S:smallByproductChance=0.15
}


