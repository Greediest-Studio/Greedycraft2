# Configuration file

##########################################################################################################
# modules
#--------------------------------------------------------------------------------------------------------#
# Enable/disable integration modules
##########################################################################################################

modules {
    B:AbyssalCraft=true
    B:OldWeapons=true
    B:something=true
    B:specialweapons=true
}


##########################################################################################################
# oldweapons
#--------------------------------------------------------------------------------------------------------#
# Configuration for OldWeapons module
##########################################################################################################

oldweapons {
    # 是否启用多功能工具
    B:enableAllInOneTool=true

    # 是否启用战斧
    B:enableBattleAxe=true

    # 是否启用巨剑
    B:enableGreatblade=true

    # 是否启用短剑
    B:enabledrag=true
}


##########################################################################################################
# something
#--------------------------------------------------------------------------------------------------------#
# Configuration for something module
##########################################################################################################

something {
    # Baidu Translate APP ID
    S:baiduAppId=

    # Baidu Translate APP Key
    S:baiduAppKey=
}


##########################################################################################################
# specialweapons
#--------------------------------------------------------------------------------------------------------#
# Configuration for specialweapons module
##########################################################################################################

specialweapons {
    # Minimum cast action lock for keybind spells when castActionTicks > 0.
    I:keybindActionLockMinTicks=1

    # Overlap ticks required for CHORD_LONG.
    I:keybindChordLongTicks=10

    # Max overlap ticks counted as CHORD_TAP.
    I:keybindChordTapMaxTicks=6

    # Default trigger ticks for hold-spells that do not override threshold.
    I:keybindHoldTriggerTicks=10

    # Ticks to classify a key as long-press.
    I:keybindLongPressTicks=10

    # Max key-down ticks still counted as tap.
    I:keybindTapMaxTicks=6
}


