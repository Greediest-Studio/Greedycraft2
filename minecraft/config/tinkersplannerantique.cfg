# Configuration file

general {
    # Automatically generate planner_short_list.dat with the configured default validation name when the file is missing.
    # 当缺少 list 文件时，自动使用已配置的默认验证名生成 planner_short_list.dat。 [default: true]
    B:autoGenerateWhenMissing=true

    # Allow the planner's give-item feature only in creative mode.
    # 将蓝图页面的“获取物品”功能限制在创造模式下使用。 [default: true]
    B:creativeOnlyGiveItem=true

    # Default validation name used when generating a short blueprint list without an explicit name.
    # 在未显式指定名称时，用于生成简短蓝图列表的默认验证名。 [default: ticlist]
    S:defaultValidationName=ticlist

    # Enable planner UI emboss cache persistence. When disabled, existing cache entries can still be used, but new cache data is only written when the cache file does not exist, or when the cache is refreshed manually. [default: true]
    B:enablePlannerUiCache=true

    # Enable import/export of short blueprint codes and /ticpa list output generation.
    # 启用简短蓝图码的导入导出与 /ticpa list output 生成功能。 [default: true]
    B:enableShortBlueprintCode=true
}


