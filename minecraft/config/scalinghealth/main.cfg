                dungeonsmod:ironslime
                dungeonsmod:kraken
                endreborn:endlord
                dungeonsmod:sun
                gct_aby:ancientshoggoth
                gct_aby:zjarugoth
                blue_skies:alchemist_illager
                blue_skies:summoner_illager
                grimreaper:grimreaper
                thebetweenlands:dreadful_mummy
                thebetweenlands:fortress_boss
                thebetweenlands:sludge_menace
                thebetweenlands:gas_cloud
                divinerpg:ancient_entity
                divinerpg:king_of_scorchers
                divinerpg:dramix
                divinerpg:parasecta
                divinerpg:the_watcher
                divinerpg:ayeraco_yellow
                divinerpg:ayeraco_green
                divinerpg:ayeraco_red
                divinerpg:ayeraco_blue
                divinerpg:ayeraco_purple
                divinerpg:sunstorm
                divinerpg:termasect
                divinerpg:eternal_archer
                divinerpg:experienced_cori
                divinerpg:densos
                divinerpg:reyvor
                divinerpg:soul_fiend
                divinerpg:twilight_demon
                divinerpg:karot
                journey:witheringbeast
                journey:beastofthenether
                journey:soulwatcher
                journey:calcia
                journey:blazier
                journey:corallator
                journey:eudor
