# Configuration file

main {

    debug {
        # 总调试开关。开启后其它调试配置才有意义。
        B:"Debug Mode"=false

        # 在屏幕上绘制生命修正、难度等调试信息。仅建议测试时开启。
        B:"Debug Overlay"=true

        # 调试模式下记录玩家受到伤害时的伤害缩放细节。
        B:"Log Player Damage"=true

        # 调试模式下记录怪物生成和属性修改细节。大量刷怪时会影响性能。
        B:"Log Spawns"=false
    }

    client {
        # 难度条 X 坐标。负数表示从屏幕右侧反向定位。
        I:"Position X"=-75

        # 难度条 Y 坐标。负数表示从屏幕底部反向定位。
        I:"Position Y"=-5

        # 是否显示难度条。关闭后客户端完全不绘制难度条。
        B:"Render Difficulty Meter"=true

        # 是否一直显示难度条。当前按键会直接切换这个开关。
        B:"Render Difficulty Meter Always"=false

        # 睡觉会改变难度时，玩家上床后是否显示提醒。
        B:"Warn When Sleeping"=false

        # 睡觉提醒文本。留空时使用语言文件中的默认文本。
        S:"Warn When Sleeping - Message"=
    }

    player {

        damage {
            # 敌对怪物受到伤害时是否也应用伤害缩放。 [default: false]
            B:"Affect Hostile Mobs"=false

            # 被动生物受到伤害时是否也应用伤害缩放。 [default: false]
            B:"Affect Passive Mobs"=false

            # 每点难度对伤害缩放的影响权重。默认 0.04 表示 250 难度时最多增加 10 倍基础伤害。 [range: 0.0 ~ 1000.0, default: 0.04]
            S:"Difficulty Weight"=0.02

            # 伤害来源未在 Scale By Source 列表中出现时使用的默认缩放值。 [range: -3.4028235E38 ~ 3.4028235E38, default: 0.0]
            S:"Generic Scale"=1.0

            # Set damage scaling by damage source. All vanilla sources should be included, but set to no scaling. Mod sources can be added too, you'll just need the damage type string. The number represents how steeply the damage scales. 0 means no scaling (vanilla), 1 means it will be proportional to difficulty/max health (whichever you set). The scaling number can be anything, although I recommend a non-negative number. [default: [inFire 0.0], [lightningBolt 0.0], [onFire 0.0], [lava 0.0], [hotFloor 0.0], [inWall 0.0], [cramming 0.0], [drown 0.0], [starve 0.0], [cactus 0.0], [fall 0.0], [flyIntoWall 0.0], [outOfWorld 0.0], [generic 0.0], [magic 0.0], [wither 0.0], [anvil 0.0], [fallingBlock 0.0], [dragonBreath 0.0], [fireworks 0.0]]
            S:"Scale By Source" <
                inFire 0.4
                poison 0.25
                lightningBolt 0.6
                onFire 0.3
                lava 0.4
                hotFloor 0.5
                inWall 0.3
                cramming 0.5
                drown 0.6
                starve 0.5
                cactus 0.5
                fall 0.1
                flyIntoWall 0.1
                outOfWorld 0.0
                generic 1.0
                magic 0.6
                indirect_magic 0.6
                wither 0.33
                anvil 0.1
                fallingBlock 0.5
                dragonBreath 0.6
                fireworks 0.5
                void 0.0
                erebus_curse 0.0
                erebusCurse 0.0
             >

            # 伤害缩放参考值：MAX_HEALTH 使用最大生命提升，PLAYER_DIFFICULTY 使用玩家难度，AREA_DIFFICULTY 使用区域难度。 [default: MAX_HEALTH]
            S:"Scaling Mode"=PLAYER_DIFFICULTY
        }

        health {
            # 是否允许本模组修改玩家最大生命值。关闭后心之容器不会提升生命上限。
            B:"Allow Modified Health"=true

            # 玩家最多可累计使用的心之容器数量。0 表示无限制。
            I:"Max Heart Containers"=128

            # 玩家初始生命值，单位为半颗心。原版为 20。
            I:"Starting Health"=10
        }

    }

    fake_players {
        # 假玩家击杀怪物时是否能产生心之容器掉落。关闭可降低刷怪机产出。
        B:"Can Generate Hearts"=true

        # 假玩家是否拥有难度数据。多数情况下建议关闭。
        B:"Have Difficulty"=false
    }

    mob {
        # 不会获得额外攻击力的实体 ID 列表，支持 * 通配符。
        S:"Damage Bonus Blacklist" <
         >

        # 怪物每点难度获得的额外攻击力倍率。0 表示禁用额外攻击力。
        D:"Damage Modifier"=0.08

        # 怪物最多获得多少额外攻击力。0 表示无限制。
        D:"Max Damage Bonus"=0

        # 敌对怪物获得额外药水效果的概率。仍需要怪物剩余难度足够。
        D:"Potion Chance (Hostiles)"=0.6

        # 被动生物获得额外药水效果的概率。仍需要生物剩余难度足够。
        D:"Potion Chance (Passives)"=0.2

        # 怪物每点难度提供的额外经验百分比。0.01 表示 100 难度额外 100%。
        D:"XP Boost"=0.15

        health {
            # Boss 是否能按难度获得额外生命值。
            B:"Allow Boss Extra Health"=true

            # 敌对怪物是否能按难度获得额外生命值。
            B:"Allow Hostile Extra Health"=true

            # 和平/被动生物是否能按难度获得额外生命值。
            B:"Allow Peaceful Extra Health"=true

            # 敌对怪物每点难度至少获得的额外生命值倍率。
            D:"Base Health Modifier"=1.0

            # 被动生物每点难度至少获得的额外生命值倍率。
            D:"Base Health Modifier Peaceful"=0.25

            # If true, the list is a whitelist. Otherwise it is a blacklist. [default: false]
            B:"Blacklist IsWhitelist"=false

            # 生命值缩放名单。列表项为实体 ID，支持 * 通配符。 [default: ]
            S:"Blacklist List" <
				abyssalcraft:chagaroth
				abyssalcraft:jzahar
				abyssalcraft:dragonboss
				abyssalcraft:shadowboss
                mowziesmobs:ferrous_wroughtnaut
                betterslimes:quazar
                draconicevolution:chaosguardian
                aether_legacy:sun_spirit
                extrabotany:gaiaiii
                extrabotany:voidherrscher
                botania:doppleganger
                mowziesmobs:barako
                mowziesmobs:frostmaw
                extrabotany:skullminion
                defiledlands:the_destroyer
                defiledlands:the_mourner
                minecraft:wither
                babymobs:babywither
                minecraft:ender_dragon
                twilightforest:naga
                twilightforest:lich
                twilightforest:hydra
                twilightforest:giant_miner
                twilightforest:armored_giant
                twilightforest:ur_ghast
                twilightforest:knight_phantom
                twilightforest:minoshroom
                twilightforest:yeti_alpha
				twilightforest:hydra_head
				twilightforest:snow_queen
                ageofminecraft:witherbosscommandblockhelpful
                gct_mobs:apocalypse_knight
                gct_mobs:apocalypse_cube
                divinerpg:hive_soldier
                divinerpg:hover_stinger
                gct_mobs:zethur
                netherex:ghast_queen
                gct_mobs:weather_eyevil
                ageofminecraft:ghastherhelpful
                journey:guardianofdestruction
