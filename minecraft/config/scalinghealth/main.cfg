                journey:scale
                journey:logger
                journey:sentryking
                journey:terranianprotector
                journey:skystalker
                journey:guardianofdestruction
                journey:sentryheart
                theaurorian:runestonedungeonkeeper
                theaurorian:spider
                theaurorian:moonqueen
                erebus:erebus.corrupted_ant_emperor
                erebus:erebus.antlion_boss
                erebus:erebus.tarantula_mini_boss
                erebus:erebus.ant_shell
                thaumicconcilium:quicksilver_elemental
                atum:pharaoh
                ee:end_king
                ee:crystal_boss
                gaiapro:gaiapro
                endexpansion:end_king
                endexpansion:crystal_boss
                endexpansion:shadow_player
                da:aegyptian_colossus
                da:aegyptian_warlord
                da:ancient_fallen
                da:ancient_knight
                da:ancient_knight_rapier
                da:apathyr
                da:everator
                da:flame_knight
                da:frost_draugr_elite
                da:great_wyrk
                da:high_king
                da:high_king_drake
                da:night_lich
                da:obsidilith
                da:void_blossom
                da:voidclysm
             >

            # 不会获得额外生命值的维度 ID 列表。只能填写整数。
            S:"Dimension Blacklist" <
             >

            # 额外生命值应用方式：ADD 为直接加值；MULTI 为按基础生命乘法；MULTI_HALF/MULTI_QUARTER 会降低高血量生物的收益。 [default: MULTI_HALF]
            S:"Scaling Mode"=MULTI_HALF
        }

        potion {
            # The potion effects that mobs can spawn with. You can add effects from other mods if you want to, or remove existing ones. Each line has 3 values separated by commas: the potion ID, the minimum difficulty (higher = less common), and the level (1 = level I, 2 = level II, etc). [default: [minecraft:strength,30,1], [minecraft:speed,10,1], [minecraft:speed,50,2], [minecraft:fire_resistance,10,1], [minecraft:invisibility,25,1], [minecraft:resistance,30,1]]
            S:"Mob Potions" <
                minecraft:strength,300,1
                minecraft:strength,800,2
                minecraft:strength,1200,3
                minecraft:regeneration,200,1
                minecraft:regeneration,400,2
                minecraft:regeneration,750,3
                minecraft:regeneration,1000,4
                minecraft:fire_resistance,400,1
                minecraft:resistance,400,1
                minecraft:resistance,900,2
             >
        }

    }

    items {
        # 是否掉落心之水晶碎片而不是完整心之容器。
        B:"Drop Shards Instead of Containers"=true

        # 绷带和医疗包治疗时是否触发标准治疗事件。关闭可避免其它模组取消治疗。
        B:"Healing Items Fire Healing Event"=true

        # 每个永久心之容器增加的最大生命值，单位为半颗心。
        I:"Health Per Heart Container"=4

        # 敌对怪物被击杀时掉落心之容器的概率。
        D:"Heart Drop Chance"=0.005

        # 被动生物被击杀时掉落心之容器的概率。
        D:"Heart Drop Chance (Passive)"=0

        # 心之容器立即治疗时是否触发标准治疗事件。关闭可避免其它模组取消治疗。
        B:"Heart Healing Event"=true

        # 使用心之容器需要消耗的经验等级。
        I:"Heart XP Level Cost"=10

        # Boss 被击杀时掉落心之容器的最大数量。
        I:"Hearts Dropped by Boss Max"=1

        # Boss 被击杀时掉落心之容器的最小数量。
        I:"Hearts Dropped by Boss Min"=0

        # 使用心之容器时立即恢复的生命值。
        I:"Hearts Health Restored"=4

        cursed_heart {
            # 使用诅咒之心时改变的玩家难度。正数增加难度。
            D:"Difficulty Change"=32.0
        }

        enchanted_heart {
            # 使用蕴魔之心时改变的玩家难度。负数降低难度。
            D:"Difficulty Change"=-32.0
        }

    }

    difficulty {
        # 怪物生成时如何计算区域难度：SINGLE_PLAYER 取最近玩家；LOCAL_PLAYERS 取附近玩家加权平均；SERVER_WIDE 使用全服进度。 [default: LOCAL_PLAYERS]
        S:"Area Mode"=LOCAL_PLAYERS

        # 玩家睡觉跳过夜晚时改变的难度。负数会降低难度。
        D:"Difficulty Added When Sleeping"=0.0

        # 为维度设置难度增长倍率。每行两个字段：维度ID 倍率，例如 -1 1.5。
        S:"Difficulty Dimension Multiplier" <
         >

        # 每次击杀 Boss 改变的难度。
        D:"Difficulty Per Boss Kill"=0.0

        # 每次击杀敌对怪物改变的难度。
        D:"Difficulty Per Kill"=0.0

        # 为特定实体设置击杀难度变化。每行两个字段：实体ID 难度变化，例如 minecraft:zombie 0.1。
        S:"Difficulty Per Kill By Mob" <
         >

        # 每次击杀被动生物改变的难度。
        D:"Difficulty Per Passive Kill"=0.0

        # 为维度设置区域难度数值修正。每行两个字段：维度ID 表达式，例如 -1 *2.0 或 1 +20。
        S:"Dimension Value Factor" <
            -1 +25
            1 +50
            4 +30
            50 +20
            51 +30
            52 +40
            53 +40
            427 *0.25
            14676 *0.25
         >

        # 难度豁免玩家列表。豁免玩家参与计算时视为 0 难度。
        S:"Exempt Players" <
         >

        # 局部难度中每个额外附近玩家增加的倍率。公式为 1 + 本值 * (附近玩家数 - 1)。
        D:"Group Area Bonus"=0

        # 玩家死亡时损失的难度。负数会让玩家死亡后增加难度。
        D:"Lost On Death"=0.0

        # 难度可达到的最大值。
        D:"Max Value"=7200

        # 难度可达到的最小值。可以和初始值不同。
        D:"Min Value"=0.0

        # 怪物生成时搜索玩家的半径。0 表示无限范围。
        I:"Search Radius"=64

        # 新玩家或新世界的初始难度。
        D:"Starting Value"=0.0

        # 怪物生成属性和药水效果时是否消耗生成难度，开启后更接近旧版本行为。
        B:"Stats Consume Difficulty"=false

        lunar_phases {
            # 8 个数字，依次对应月相倍率。第一项为满月，第五项为新月。
            S:"Lunar Phase Multipliers" <
                1.5
                1.3
                1.2
                1.0
                0.8
                1.0
                1.2
                1.3
             >

            # 是否启用月相难度倍率。只在夜晚根据月相调整怪物生成难度。
            B:"Lunar Phases Enabled"=true
        }

    }

    network {
        # 服务端向客户端发送更新包的间隔，单位 tick。越小同步越快，但网络和处理开销越高。
        I:"Packet Delay"=60
    }

    world {

        heart_crystal_ore {
            # 距离出生点带来的额外矿脉数量上限。
            D:"Extra Vein Cap"=3.0

            # 距离出生点每增加 1 格，额外可能矿脉数增加多少。
            D:"Extra Vein Rate"=9.599999757483602E-4

            # 矿石生成的最高 Y 坐标，必须高于最低高度。
            I:"Max Height"=20

            # 矿石生成的最低 Y 坐标，必须低于最高高度。
            I:"Min Height"=5

            # 心之水晶矿石基础掉落碎片数量。时运会在此基础上增加。
            I:"Quantity Dropped"=1

            # 每条矿脉的大小。
            I:"Vein Size"=2

            # 每个区块生成的矿脉数量。小数部分表示额外矿脉概率。
            D:"Veins Per Chunk"=0.5
        }

    }

    wealth {
        # 是否允许假玩家击杀触发额外掉落。
        B:"Allow Fake Players"=true

        # 为 true 时使用击杀玩家的难度计算额外掉落；为 false 时使用被杀实体生成时记录的难度。
        B:"Difficulty Based On Player"=true

        # 是否启用基于难度的额外掉落。掉落表文件为 config/scalinghealth/wealth_drops.json。
        B:"Enable Wealth Drops"=true

        # 是否要求实体最近被玩家攻击才产生额外掉落。关闭时保持旧 Scaling Wealth 行为。
        B:"Require Recently Hit"=false

        # 是否遵守 doMobLoot 游戏规则。关闭时保持旧 Scaling Wealth 行为。
        B:"Respect Mob Loot Game Rule"=false

        # 加载难度掉落表时，是否在日志中警告无效实体、物品、区间或 NBT。
        B:"Warn Invalid Wealth Drops"=true
    }

}


