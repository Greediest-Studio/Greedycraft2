    # 使用刀击杀末影人时掉落末影人脆骨的概率。范围：0.0 到 1.0。 [range: 0.0 ~ 1.0, default: 0.35]
    S:endermanGristleDropChance=0.35

    # If true, Enderman Gristle, Raw Ender Sausage, and Ender Sausage use sneak-only random teleport without self-damage. If false, they use sneak-only forward teleport with self-damage.
    # 为 true 时，末影人脆骨、生末影肉肠、末影肉肠会在潜行食用时随机传送且不受伤；为 false 时，潜行食用会向前传送并受伤。 [default: true]
    B:endermanGristleUsesRandomTeleport=true

    # If true, End's Delight foods that grant Levitation only grant Levitation when eaten while sneaking. Other food effects still apply normally.
    # 为 true 时，末地农家乐中会给予漂浮效果的食物只有潜行食用才会给予漂浮；其他食物效果仍正常生效。 [default: true]
    B:levitationFoodsRequireSneaking=true

    # Chance for a Shulker killed with a knife to drop Shulker Meat. Range: 0.0 to 1.0.
    # 使用刀击杀潜影贝时掉落潜影贝肉的概率。范围：0.0 到 1.0。 [range: 0.0 ~ 1.0, default: 0.9]
    S:shulkerMeatDropChance=0.9
}


