# Configuration file

mimicarnation {
    # Additional meal item registry names accepted by Mimicarnation. Example: modid:item_name
    # 拟灵花额外接受的餐食物品注册名。示例：modid:item_name [default: ]
    S:extraMealItems <
     >
}


propelplant {
    # Explosion power for Propelplant hazards.
    # 枪药藤危险交互的爆炸强度。 [range: 0.0 ~ 1000.0, default: 6.0]
    S:propelplantExplosionPower=6.0

    # 0 = always dangerous, 1 = never dangerous, 2 = safe when planted on Rich Soul Soil.
    # 0 = 始终危险，1 = 永不危险，2 = 种在肥沃灵魂土上时安全。 [range: 0 ~ 2, default: 2]
    I:propelplantHazardMode=2
}


propelplant_worldgen {
    # Allowed biome registry names for natural Propelplant generation. Use * to allow every Nether biome.
    # 允许枪药藤自然生成的生物群系注册名白名单，使用 * 可允许所有下界生物群系。 [default: [netherized:crimson_forest], [nb:crimson_forest]]
    S:propelplantAllowedBiomes <
        netherized:crimson_forest
        nb:crimson_forest
     >

    # Generation attempts per Nether chunk. Lower this to reduce natural Propelplant density.
    # 每个下界区块的枪药藤生成尝试次数，调低可降低自然生成密度。 [range: 0 ~ 64, default: 8]
    I:propelplantGenerationAttemptsPerChunk=8

    # If false, Propelplant Cane will not generate naturally.
    # 若为 false，枪药藤不会自然生成。 [default: true]
    B:propelplantWorldgenEnabled=true
}


soul_compost {
    # If true, Soul Compost only converts in the Nether.
    # 若为 true，灵魂肥料只会在下界转化。 [default: true]
    B:soulCompostNetherOnly=true

    # Multiplier for Soul Compost conversion chance. At the default base chance, 20 already reaches the 100% cap.
    # 灵魂肥料转化概率倍率。按当前默认基础概率，20 就已经达到 100% 封顶。 [range: 0.0 ~ 20.0, default: 1.0]
    S:soulCompostSpeedMultiplier=1.0
}


