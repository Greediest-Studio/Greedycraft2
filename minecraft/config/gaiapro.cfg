# Configuration file

gaia_guardian_iv {
    # Configured drops granted to every attacking player. When replacePerPlayerLootTable=true, these entries replace Gaia Guardian IV's normal per-player loot table. Otherwise they are granted in addition to the normal loot. Format: modid:item@metadata,count [default: ]
    S:perPlayerExtraDrops <
     >

    # Set to true to replace Gaia Guardian IV's normal per-player loot table with perPlayerExtraDrops. False keeps the original loot and grants configured drops in addition. [default: false]
    B:replacePerPlayerLootTable=true

    # Dimension ids used by the summon dimension blacklist/whitelist. Empty means no ids are configured.
    I:summonDimensionIds <
        42
     >

    # Set to true to treat summonDimensionIds as a whitelist. False means blacklist mode. [default: false]
    B:summonDimensionWhitelist=true
}