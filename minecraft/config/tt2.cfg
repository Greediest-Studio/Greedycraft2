# Configuration file

general {
    # 匠魂盔甲自带基础四件盔甲获得的额外初始强化槽数量。
    # 默认值：1
    # 
    # Number of extra starting modifier slots granted to Construct's Armory's four base armor pieces.
    # Default: 1
    I:constructArmorExtraModifierSlots=1

    # 穿戴至少 3 件匠魂盔甲基础盔甲时，敌人造成的防御损伤倍率。0.5 = 防御损伤减半。
    # 默认值：0.5
    # 
    # Defense Damage gain multiplier from enemies while wearing at least 3 base Construct's Armory armor pieces. 0.5 = half Defense Damage.
    # Default: 0.5
    D:constructArmorSetDefenseDamageGainMultiplier=0.5

    # 穿戴至少 1 件匠魂盔甲基础盔甲时，防御损伤开始恢复前的固定等待时间。20 tick = 1 秒。
    # 默认值：20
    # 
    # Fixed recovery delay before Defense Damage starts recovering while wearing at least 1 base Construct's Armory armor piece. 20 ticks = 1 second.
    # Default: 20
    I:constructArmorSetDefenseDamageRecoveryDelayTicks=20

    # 穿戴至少 2 件匠魂盔甲基础盔甲时，防御损伤恢复间隔。20 tick = 1 秒。
    # 默认值：20
    # 
    # Defense Damage recovery interval while wearing at least 2 base Construct's Armory armor pieces. 20 ticks = 1 second.
    # Default: 20
    I:constructArmorSetDefenseDamageRecoveryIntervalTicks=20

    # 穿戴至少 2 件匠魂盔甲基础盔甲时，每次恢复移除的防御损伤比例。0.20 = 20%。
    # 默认值：0.20
    # 
    # Defense Damage removed on each recovery tick while wearing at least 2 base Construct's Armory armor pieces. 0.20 = 20%.
    # Default: 0.20
    D:constructArmorSetDefenseDamageRecoveryPercent=0.2

    # 穿戴 4 件匠魂盔甲基础盔甲时，防御损伤最高累计值。0.5 = 最多损失 50% 防御效果。
    # 默认值：0.5
    # 
    # Maximum accumulated Defense Damage while wearing 4 base Construct's Armory armor pieces. 0.5 = lose at most 50% defense efficiency.
    # Default: 0.5
    D:constructArmorSetMaxDefenseDamage=0.5

    # 匠魂盔甲自带基础四件盔甲套装奖励：每件提供的挖掘速度提升比例。0.15 = 每件 15%。
    # 默认值：0.15
    # 
    # Construct's Armory base armor set bonus: mining speed bonus per worn piece. 0.15 = 15% per piece.
    # Default: 0.15
    D:constructArmorSetMiningSpeedPerPiece=0.15

    # 迅捷盾破防冷却时长系数。数值越大，冷却越长。
    # 冷却时长（tick）= ceil((5 / 坚韧手柄耐久系数) x 该系数 x 20)，最少 30 tick。
    # 默认值：1.0
    # 
    # Shield Break Cooldown Multiplier. Larger values result in longer cooldowns.
    # Cooldown (ticks) = ceil((5 / Tough Handle Durability Multiplier) x This Multiplier x 20), minimum 30 ticks.
    # Default: 1.0
    D:cooldownCoefficient=1.0

    # Boss 每次命中玩家时增加的防御损伤。0.075 = 7.5%。
    # 
    # Defense Damage added by each boss hit. 0.075 = 7.5%.
    D:defenseDamageBossHitPercent=0.075

    # 防御损伤最多会把护甲、护甲韧性与相关防御词条效果降低到原本的比例。0.25 = 最低保留 25%。
    # 
    # Minimum remaining efficiency for armor, toughness, and related defensive traits under Defense Damage. 0.25 = keep at least 25%.
    D:defenseDamageMinimumEfficiency=0.25

    # 非 Boss 生物每次命中玩家时增加的防御损伤。0.0375 = 3.75%。
    # 
    # Defense Damage added by each non-boss mob hit. 0.0375 = 3.75%.
    D:defenseDamageNormalHitPercent=0.0375

    # 玩家多久没有受到会造成防御损伤的伤害后开始恢复。40 tick = 2 秒。
    # 
    # How long after the last Defense Damage hit before recovery starts. 40 ticks = 2 seconds.
    I:defenseDamageRecoveryDelayTicks=40

    # 防御损伤每隔多久恢复一次。30 tick = 1.5 秒。
    # 
    # Interval between Defense Damage recovery ticks. 30 ticks = 1.5 seconds.
    I:defenseDamageRecoveryIntervalTicks=30

    # 每次恢复移除的防御损伤比例。0.15 = 15%。
    # 
    # Defense Damage removed on each recovery tick. 0.15 = 15%.
    D:defenseDamageRecoveryPercent=0.15

    # 防御损伤对同一名玩家的触发间隔。15 tick = 0.75 秒；间隔结束前，高频攻击不会重复累积新的防御损伤。
    # 
    # Trigger interval for Defense Damage on the same player. 15 ticks = 0.75 seconds; hits during this interval will not add more Defense Damage.
    I:defenseDamageTriggerIntervalTicks=15

    # 防御姿态期间，范围攻击的半径。
    # 
    # Radius of the Doppelhander's area attack during Defensive Stance.
    D:doppelhanderAoeRadius=4.5

    # 德式双手剑基础格挡减伤比例。0.6 = 60%。
    # 
    # Base damage reduction when blocking with the Doppelhander. 0.6 = 60%.
    D:doppelhanderBaseBlockReduction=0.6

    # 德式双手剑每次成功格挡后额外提升的格挡比例系数。
    # 实际提升 = 手柄系数 x 该值。
    # 
    # Extra block percentage gained on each successful block scales with handle modifier times this value.
    D:doppelhanderBlockGainPerHandleModifier=5.0

    # 防御姿态期间，每次成功格挡回复的最大生命值百分比。0.05 = 5%。
    # 
    # Percentage of max health restored on each successful block during Defensive Stance. 0.05 = 5%.
    D:doppelhanderBlockHealPercent=0.05

    # 防御姿态期间，攻击力提升公式中每点护甲对应的伤害加成系数。
    # 
    # Damage bonus coefficient per point of provided armor during Defensive Stance.
    D:doppelhanderDamageBonusArmorCoefficient=1.5

    # 防御姿态期间，至少获得的攻击力提升百分比。20 = 20%。
    # 
    # Minimum damage bonus percentage for the Doppelhander during Defensive Stance. 20 = 20%.
    D:doppelhanderDamageBonusMinPercent=20.0

    # 德式双手剑进入防御姿态后的持续时间（秒）。
    # 
    # Duration of the Doppelhander's Defensive Stance in seconds.
    I:doppelhanderDefensiveStanceDurationSeconds=20

    # 是否让匠魂盔甲自带的基础四件盔甲获得额外初始强化槽。
    # 该效果会写入隐藏标记，已有盔甲在玩家物品栏中被检测到时会按标记补发缺失的额外槽。
    # 
    # Whether to grant extra starting modifier slots to Construct's Armory's four base armor pieces.
    # This writes a hidden marker; existing armor found in player inventories will receive missing extra slots based on that marker.
    B:enableConstructArmorExtraModifierSlots=true

    # 是否启用防御损伤系统。受到非玩家生物伤害会逐渐降低护甲、护甲韧性与部分受击防御词条效果。
    # 
    # Whether to enable Defense Damage. Damage from non-player living entities gradually weakens armor, toughness, and some defensive on-hit armor traits.
    B:enableDefenseDamage=true

    # 是否注册并启用德式双手剑。设为 false 后，该物品不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Doppelhander. Set to false to remove it from the game. Requires restart.
    B:enableDoppelhander=true

    # 是否注册并启用重装盾。设为 false 后，该物品不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Heavy Shield. Set to false to remove it from the game. Requires restart.
    B:enableHeavyShield=true

    # 是否注册并启用沙锤。设为 false 后，该物品不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Maraca. Set to false to remove it from the game. Requires restart.
    B:enableMaraca=true

    # 是否注册并启用双节棍。设为 false 后，该物品不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Nunchaku. Set to false to remove it from the game. Requires restart.
    B:enableNunchaku=true

    # 是否注册并启用斥候套装。设为 false 后，该套护甲不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Scout Armor set. Set to false to remove it from the game. Requires restart.
    B:enableScoutArmor=true

    # 是否注册并启用迅捷盾。设为 false 后，该物品不会出现在游戏中，需要重启生效。
    # 
    # Whether to register and enable the Swift Shield. Set to false to remove it from the game. Requires restart.
    B:enableSwiftShield=true

    # 失衡效果：Boss 单位的伤害输出降低比例。0.5 = 50%。
    # 默认值：0.5
    # 
    # Stagger Effect: Damage output reduction for Bosses (0.5 = 50%).
    # Default: 0.5
    D:imbalanceBossDamageReduction=0.5

    # 失衡效果：Boss 单位的击退强度降低比例。0.5 = 50%。
    # 默认值：0.5
    # 
    # Stagger Effect: Knockback reduction for Bosses (0.5 = 50%).
    # Default: 0.5
    D:imbalanceBossKnockbackReduction=0.5

    # 失衡效果：非 Boss 单位的伤害输出降低比例。1.0 = 100%。
    # 默认值：1.0
    # 
    # Stagger Effect: Damage output reduction for non-boss entities (1.0 = 100%).
    # Default: 1.0
    D:imbalanceDamageReduction=1.0

    # 失衡效果：目标额外承受伤害的比例。0.5 = 50%。
    # 默认值：0.5
    # 
    # Stagger Effect: Damage taken increase (0.5 = 50%).
    # Default: 0.5
    D:imbalanceDamageTakenIncrease=0.5

    # 失衡持续时间系数（秒/伤害点）。
    # 失衡时长（秒）= 造成伤害 x 该值。
    # 默认值：0.75
    # 
    # Stagger Duration Coefficient (sec/dmg).
    # Stagger Duration (sec) = Damage Dealt x Value.
    # Default: 0.75
    D:imbalanceDurationMultiplier=0.75

    # 失衡发光显示模式：
    # 0 = 仅在纯失衡免疫期发光
    # 1 = 仅在失衡期间发光
    # 2 = 失衡与失衡免疫期间都发光
    # 
    # Stagger Glow Display Mode:
    # 0 = Glow only during pure Imbalance Immunity period (after Stagger ends)
    # 1 = Glow during Stagger, but not during Imbalance Immunity alone
    # 2 = Glow during both Stagger and Imbalance Immunity periods
    I:imbalanceGlowMode=0

    # 失衡效果：非 Boss 单位的击退强度降低比例。1.0 = 100%。
    # 默认值：1.0
    # 
    # Stagger Effect: Knockback reduction for non-boss entities (1.0 = 100%).
    # Default: 1.0
    D:imbalanceKnockbackReduction=1.0

    # 失衡效果：非 Boss 单位的移速降低比例。1.0 = 100%，对 Boss 无效。
    # 默认值：1.0
    # 
    # Stagger Effect: Movement speed reduction for non-boss entities (1.0 = 100%, no effect on Bosses).
    # Default: 1.0
    D:imbalanceSpeedReduction=1.0

    # 沙锤“攻击力提升”旋律给予友方的攻击伤害提升比例。0.30 = 30%。
    # 
    # Attack damage bonus granted to allies by the Maraca Attack Melody. 0.30 = 30%.
    D:maracaAttackMelodyAllyBonus=0.3

    # 沙锤“攻击力提升”旋律的基础持续时间。20 tick = 1 秒，默认 1200 tick = 60 秒。
    # 
    # Base duration of the Maraca Attack Melody. 20 ticks = 1 second. Default: 1200 ticks = 60 seconds.
    I:maracaAttackMelodyDurationTicks=1200

    # 沙锤“攻击力提升”旋律给予演奏者自身的攻击伤害提升比例。0.45 = 45%。
    # 
    # Attack damage bonus granted to the performer by the Maraca Attack Melody. 0.45 = 45%.
    D:maracaAttackMelodySelfBonus=0.45

    # 沙锤“狂欢派对！”持续时间系数。实际持续时间 = 被清空的其他旋律剩余时间总和 x 该系数。
    # 
    # Duration coefficient for the Maraca Party melody. Actual duration = total remaining duration of removed melodies x this value.
    D:maracaPartyDurationCoefficient=1.0

    # 双节棍攻击速度。原版剑为 1.6，数值越高越快。
    # 范围：0.1 ~ 4.0
    # 
    # Nunchaku Attack Speed. Original sword = 1.6, higher value means faster.
    # Range: 0.1 ~ 4.0
    D:nunchakuAttackSpeed=2.5

    # 连击上限与绑定结系数的乘数。
    # 范围：0.1 ~ 10.0
    # 
    # Multiplier for combo limit and binding knot modifier.
    # Range: 0.1 ~ 10.0
    D:nunchakuComboCapBindingMultiplier=0.45

    # 停止命中后，连击效果保留的 tick 数。
    # 20 tick = 1 秒。默认值：60
    # 
    # Ticks that combo effect remains after stopping hits.
    # 20 ticks = 1 second. Default: 60
    I:nunchakuComboDecayDelay=60

    # 双节棍每次命中获得的连击伤害加成。0.1 = 10%。
    # 范围：0.01 ~ 1.0
    # 
    # Combo damage bonus per nunchaku hit. 0.1 = 10%.
    # Range: 0.01 ~ 1.0
    D:nunchakuComboGainPerHit=0.1

    # 迅捷盾格挡值上限的百分比系数。
    # 格挡值上限 = 大板材料攻击力 x 坚韧手柄耐久系数 x (该值 / 100)。
    # 默认值：50.0
    # 
    # Max Parry Percentage Multiplier.
    # Max Parry = Plate Material Attack x Tough Handle Durability Multiplier x (Value / 100).
    # Default Value: 50.0
    D:parryThresholdPercent=50.0

    # 精准格挡判定持续时间（tick）。举盾动作发生后，在此时间内受到攻击会被视为精准格挡。
    # 20 tick = 1 秒。默认值：30（1.5 秒）
    # 
    # Perfect Guard Duration (Ticks). Attacks received within this window after raising the shield are considered a Perfect Guard.
    # 20 ticks = 1 second. Default: 30 (1.5s)
    I:perfectParryWindowTicks=30

    # 斥候套装总闪避概率上限。0.8 = 80%。该上限会按部位比例分摊到各件。
    # 
    # Maximum total dodge chance for Scout Armor. 0.8 = 80%. This cap is distributed across armor slots by part ratio.
    D:scoutDodgeChanceCap=0.8

    # 斥候套装闪避概率系数。
    # 每个部位的闪避贡献 = 该部位护甲值对应的减伤百分比 x 该系数。
    # 
    # Coefficient for Scout Armor dodge chance.
    # Each piece contributes armor-reduction-percent x this coefficient.
    D:scoutDodgeChanceCoefficient=1.0

    # 斥候套装成功闪避时仍然承受的伤害比例。0.2 = 承受原伤害的 20%。
    # 
    # Damage factor taken on a successful Scout Armor dodge. 0.2 = take 20% of the original damage.
    D:scoutDodgeDamageFactor=0.2

    # 斥候套装对环境伤害（如熔岩、火焰、仙人掌等）的总减伤比例。0.5 = 50%。该值会按部位比例分摊到各件。
    # 
    # Total environmental damage reduction granted by Scout Armor for hazards such as lava, fire, and cactus. 0.5 = 50%. This value is distributed across pieces by part ratio.
    D:scoutEnvironmentalDamageReduction=0.5

    # 斥候套装对摔落伤害的总减伤比例。0.8 = 80%。该值会按部位比例分摊到各件。
    # 
    # Total fall damage reduction granted by Scout Armor. 0.8 = 80%. This value is distributed across pieces by part ratio.
    D:scoutFallDamageReduction=0.8

    # 斥候套装对远程伤害加成的系数。
    # 实际加成百分比 = 各部位护甲板材料在该部位的护甲韧性平均值 x 该系数。
    # 
    # Coefficient for Scout Armor ranged damage bonus.
    # Actual bonus percent = average plate toughness for each piece x this coefficient.
    D:scoutRangedDamageCoefficient=2.0
}


