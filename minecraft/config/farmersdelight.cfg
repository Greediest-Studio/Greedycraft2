# Configuration file

client {
    # Should the health bar have a silver sheen when the player has the Comfort effect? [default: true]
    B:comfortHealthOverlay=true

    # Should meal and drink tooltips display which effects they provide? [default: true]
    B:foodEffectTooltip=true

    # Should the hunger bar have a gilded overlay when the player has the Nourishment effect? [default: true]
    B:nourishmentHungerOverlay=true
}


farming {
    # Which rope should Tomato Vines leave behind when mined by hand? [default: farmersdelight:rope]
    S:defaultTomatoVineRope=farmersdelight:rope

    # Should tomato vines be able to climb ropes registered through 1.12.2 OreDictionary entries fdRopes, rope or blockRope? [default: true]
    B:enableTomatoVineClimbingTaggedRopes=true
}


overrides {
    # Should the Dispenser be able to operate a Cutting Board in front of it? (Kept for upstream parity; dispenser cutting is not present in this 1.12.2 port.) [default: true]
    B:dispenserUsesToolsOnCuttingBoard=true

    # If enabled, Pumpkin Pie will require the user to sneak to place it down as a block. [default: false]
    B:enablePumpkinPieSneakToPlace=false

    # Should Rabbit Stew grant users the jumping prowess of a rabbit when eaten? [default: true]
    B:rabbitStewJumpBoost=true

    # Should soups and stews from vanilla Minecraft grant additional effects, like meals from this mod? [default: true]
    B:vanillaSoupExtraEffects=true

    stack_size {
        # Should BowlFoodItems in the following list become stackable to 16, much like Farmer's Delight's meals? [default: true]
        B:enableStackableSoupItems=true

        # List of BowlFoodItems. They must be vanilla ItemSoup items or return a bowl container to be affected. [default: [minecraft:mushroom_stew], [minecraft:beetroot_soup], [minecraft:rabbit_stew]]
        S:soupItemList <
            minecraft:mushroom_stew
            minecraft:beetroot_soup
            minecraft:rabbit_stew
         >
    }

}


recipe_book {
    # Should the Cooking Pot have a Recipe Book available on its interface? (Kept for upstream parity; 1.12.2 GUI has no recipe book widget.) [default: true]
    B:enableRecipeBookCookingPot=true
}


settings {
    # Dye colors that make Canvas Sign text render white by default. Valid values: white, orange, magenta, light_blue, yellow, lime, pink, gray, light_gray, cyan, purple, blue, brown, green, red, black. [default: [gray], [purple], [blue], [brown], [green], [red], [black]]
    S:canvasSignDarkBackgroundList <
        gray
        purple
        blue
        brown
        green
        red
        black
     >

    # How much of a bonus should each level of Fortune grant to Cutting Board chances? Set it to 0.0 to disable this. [range: 0.0 ~ 1.0, default: 0.1]
    S:cuttingBoardFortuneBonus=0.1

    # Should players be able to reel back rope, bottom to top, when sneak-using with an empty hand on them? [default: true]
    B:enableRopeReeling=true

    # Farmer's Delight adds crates (3x3) for vanilla crops, similar to Quark and Thermal Cultivation. Should they be craftable? [default: true]
    B:enableVanillaCropCrates=true

    # Should Novice and Apprentice Farmers buy this mod's crops? [default: true]
    B:farmersBuyFDCrops=true

    # How often should Rich Soil Farmland boost a plant's growth at each random tick? Set it to 0.0 to disable this. [range: 0.0 ~ 1.0, default: 0.2]
    S:richSoilBoostChance=0.2

    # Should Future MC ignore its Oceanic Expanse stripped-log gating so stripped logs stay registered when Oceanic Expanse is present? [default: true]
    B:skipFutureMcOceanicExpanseCheck=true

    # When a Cutting Board recipe tool is ore:toolAxe, match the held tool with instanceof ItemAxe instead of the OreDictionary list. [default: true]
    B:toolAxeUsesItemAxeCheck=true

    # Should the Wandering Trader sell some of this mod's items when Wandering Traders Backport is loaded? [default: true]
    B:wanderingTraderSellsFDItems=true
}


world {
    # Should FD crops show up planted randomly in various village farms? (Kept for upstream parity.) [default: true]
    B:genFDCropsOnVillageFarms=true

    # Should FD generate Compost Heaps across village biomes when the Village Names compatibility path is loaded? [default: true]
    B:genVillageCompostHeaps=true

    # Should this mod add some of its items as extra chest loot across Minecraft? (Kept for upstream parity; chest-loot injection is not present in this 1.12.2 port.) [default: true]
    B:generateFDChestLoot=true

