# Configuration file

editing {
    # Delay used by DELAYED JEI refresh mode, in client ticks. [range: 1 ~ 1200, default: 40]
    I:delayed_jei_refresh_ticks=40

    # Log edit, save and refresh timings for pack authors. [default: false]
    B:edit_performance_debug=false

    # How JEI quest/lootcrate refreshes after editing. IMMEDIATE preserves old behavior, DELAYED batches refreshes, MANUAL waits for /ftbquests refresh_jei. [default: DELAYED]
    S:jei_refresh_mode=MANUAL
}


